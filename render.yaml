services:
  # 🔹 Backend (API)
  - type: web
    name: diet-api
    runtime: node
    rootDir: api
    buildCommand: npm install
    startCommand: node app.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false

  # 🔹 Frontend (React Vite)
  - type: web
    name: diet-client
    runtime: node
    rootDir: client
    buildCommand: npm install && npm run build
    startCommand: npx serve -s dist
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_URL
        sync: false